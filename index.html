<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoA vs AoS Benchmark</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            color-scheme: light dark;
            --app-bg: #eef3f9;
            --surface: #ffffff;
            --surface-muted: #f5f8fc;
            --surface-soft: #edf3fb;
            --text-main: #1f2937;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --accent: #2f7d61;
            --accent-soft: #dbefe6;
            --aos: #8b6f47;
            --border: #dbe3ef;
            --shadow: rgba(15, 23, 42, 0.12);
            --winner-bg: #fff7d6;
            --winner-text: #8a6513;
            --error-bg: #fff1f2;
            --error-border: #fda4af;
            --error-text: #be123c;
            --grid: rgba(31, 41, 55, 0.1);
            --header-grad-start: #6e9f91;
            --header-grad-end: #8ba07a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --app-bg: #141a17;
                --surface: #1c2622;
                --surface-muted: #24312b;
                --surface-soft: #2a3931;
                --text-main: #e7eee9;
                --text-secondary: #c7d3cb;
                --text-muted: #a5b6ab;
                --accent: #8bc8ad;
                --accent-soft: #244639;
                --aos: #d0b084;
                --border: #36483f;
                --shadow: rgba(0, 0, 0, 0.35);
                --winner-bg: #473b23;
                --winner-text: #f0d9ab;
                --error-bg: #3d1823;
                --error-border: #9f2f4d;
                --error-text: #fca5b5;
                --grid: rgba(229, 235, 245, 0.14);
                --header-grad-start: #3d5d53;
                --header-grad-end: #5a6b4a;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--app-bg);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 20px 55px var(--shadow);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--header-grad-start) 0%, var(--header-grad-end) 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .content {
            padding: 40px 30px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            padding: 30px;
            background: var(--surface-muted);
            border-radius: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-input {
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 0.95em;
            background: var(--surface);
            color: var(--text-main);
        }

        .size-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: 2px solid var(--accent);
            background: var(--surface);
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            font-size: 0.95em;
        }

        button:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        button.active {
            background: var(--accent);
            color: white;
        }

        .run-button {
            grid-column: 1 / -1;
            padding: 15px;
            font-size: 1.1em;
            background: var(--accent);
            color: white;
            border: none;
            margin-top: 10px;
        }

        .run-button:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--shadow);
        }

        .run-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-section {
            margin-top: 40px;
        }

        .results-section h2 {
            color: var(--text-main);
            margin-bottom: 20px;
            font-size: 1.8em;
            padding-bottom: 10px;
            border-bottom: 3px solid var(--accent);
        }

        .result-header {
            background: var(--surface-soft);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
        }

        .result-header h3 {
            color: var(--accent);
            margin-bottom: 8px;
        }

        .result-header p {
            color: var(--text-muted);
            font-size: 0.95em;
        }

        .benchmark-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .benchmark-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .benchmark-card:hover {
            border-color: var(--accent);
            box-shadow: 0 5px 15px var(--shadow);
        }

        .benchmark-card h4 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .benchmark-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .benchmark-row:last-child {
            border-bottom: none;
        }

        .benchmark-label {
            font-weight: 600;
            color: var(--text-secondary);
        }

        .benchmark-values {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .value-item {
            text-align: right;
        }

        .value-label {
            font-size: 0.8em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .value-number {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--text-main);
            font-family: 'Courier New', monospace;
        }

        .soa {
            color: var(--accent);
        }

        .aos {
            color: var(--aos);
        }

        .winner {
            font-size: 1.1em;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 4px;
            background: var(--winner-bg);
            color: var(--winner-text);
        }

        .system-info {
            background: var(--surface-soft);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 25px;
            margin-top: 40px;
        }

        .system-info h3 {
            color: var(--accent);
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .info-item {
            background: var(--surface);
            padding: 15px;
            border-radius: 6px;
            border-left: 3px solid var(--accent);
        }

        .info-label {
            font-size: 0.85em;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1em;
            font-weight: 600;
            color: var(--text-main);
            font-family: 'Courier New', monospace;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: var(--accent);
        }

        .spinner {
            border: 4px solid var(--surface-soft);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .summary-table-wrap {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            overflow-x: auto;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
        }

        .summary-table th,
        .summary-table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.95em;
        }

        .summary-table thead th {
            background: var(--surface-soft);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-size: 0.8em;
        }

        .summary-table tbody tr:hover {
            background: var(--surface-muted);
        }

        .summary-table td.value-soa {
            color: var(--accent);
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }

        .summary-table td.value-aos {
            color: var(--aos);
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }

        .summary-table td.value-winner {
            color: var(--text-main);
            font-weight: 600;
        }

        .chart-container {
            background: var(--surface);
            padding: 25px;
            border-radius: 8px;
            border: 2px solid var(--border);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .chart-container h4 {
            color: var(--accent);
            margin-bottom: 20px;
            font-size: 1.2em;
            text-align: center;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        footer {
            background: var(--surface-muted);
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .error {
            background: var(--error-bg);
            border: 2px solid var(--error-border);
            color: var(--error-text);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .benchmark-grid {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>SoA vs AoS Benchmark</h1>
            <p>Browser benchmark for memory layout experiments.</p>
        </header>

        <div class="content">
            <div class="controls">
                <div class="control-group">
                    <label>Collection sizes</label>
                    <div class="size-selector">
                        <button class="size-btn active" data-size="small">Small (1K)</button>
                        <button class="size-btn active" data-size="medium">Medium (100K)</button>
                        <button class="size-btn active" data-size="large">Large (10M)</button>
                    </div>
                </div>
                <div class="control-group">
                    <label>Iterations per test</label>
                    <input type="number" id="iterations" value="100" min="1" max="1000" class="control-input">
                </div>
                <button class="run-button" id="runBtn">Run Benchmark</button>
            </div>

            <div id="error-container"></div>

            <div id="results" style="display: none;">
                <div class="results-section">
                    <h2>Results</h2>
                    <div id="results-content"></div>
                </div>

                <div class="results-section">
                    <h2>Summary Table</h2>
                    <div id="summary-table-container"></div>
                </div>

                <div class="results-section">
                    <h2>Performance Charts</h2>
                    <div class="charts-grid" id="charts-container"></div>
                </div>

                <div class="system-info">
                    <h3>System Information</h3>
                    <div class="info-grid" id="system-info"></div>
                </div>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Running benchmarks...</p>
            </div>
        </div>

        <footer>
            <p>
                <a href="https://yazmeyaa.github.io/javascript_soa_aos_performance_test/" target="_blank" rel="noopener noreferrer">Live page</a>
                ·
                <a href="https://en.algorithmica.org/hpc/cpu-cache/aos-soa/" target="_blank" rel="noopener noreferrer">AoS vs SoA notes</a>
            </p>
        </footer>
    </div>

    <script>
        class PositionsSoA {
            constructor(size) {
                this.x = new Float32Array(size);
                this.y = new Float32Array(size);
                this.z = new Float32Array(size);
            }
        }

        class Benchmark {
            constructor() {
                this.sizes = {
                    small: 1_000,
                    medium: 100_000,
                    large: 10_000_000
                };
                this.selectedSizes = { small: true, medium: true, large: true };
                this.iterations = 100;
                this.results = {};
                this.charts = {};
                this.initUI();
            }

            initUI() {
                document.querySelectorAll('.size-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const size = btn.dataset.size;
                        btn.classList.toggle('active');
                        this.selectedSizes[size] = !this.selectedSizes[size];
                    });
                });

                document.getElementById('iterations').addEventListener('change', (e) => {
                    this.iterations = Math.max(1, parseInt(e.target.value) || 100);
                });

                document.getElementById('runBtn').addEventListener('click', () => this.runAllBenchmarks());
            }

            async runAllBenchmarks() {
                const selectedCount = Object.values(this.selectedSizes).filter(Boolean).length;
                if (selectedCount === 0) {
                    this.showError('Please select at least one collection size');
                    return;
                }

                document.getElementById('error-container').innerHTML = '';
                document.getElementById('loading').style.display = 'block';
                document.getElementById('results').style.display = 'none';
                document.getElementById('runBtn').disabled = true;

                this.results = {};

                try {
                    for (const [size, selected] of Object.entries(this.selectedSizes)) {
                        if (selected) {
                            await new Promise(resolve => {
                                setTimeout(() => {
                                    this.runBenchmark(size);
                                    resolve();
                                }, 10);
                            });
                        }
                    }

                    this.displayResults();
                    this.displaySummaryTable();
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('results').style.display = 'block';
                    this.displaySystemInfo();
                    this.createCharts();
                } catch (error) {
                    this.showError(`Error: ${error.message}`);
                    document.getElementById('loading').style.display = 'none';
                } finally {
                    document.getElementById('runBtn').disabled = false;
                }
            }

            runBenchmark(sizeKey) {
                const size = this.sizes[sizeKey];
                const results = {};

                // Initialize data
                const posSoA = new PositionsSoA(size);
                const velSoA = new PositionsSoA(size);
                const posAoS = Array.from({ length: size }, () => ({ x: 0, y: 0, z: 0 }));
                const velAoS = Array.from({ length: size }, () => ({ x: 1, y: 1, z: 1 }));

                this.initData(posSoA, velSoA, posAoS, velAoS, size);

                // Run tests
                const tests = {
                    'SET': {
                        soA: () => this.testSoASet(posSoA, size),
                        aoS: () => this.testAoSSet(posAoS, size)
                    },
                    'GET': {
                        soA: () => this.testSoAGet(posSoA, size),
                        aoS: () => this.testAoSGet(posAoS, size)
                    },
                    'MOVE': {
                        soA: () => this.testSoAMove(posSoA, velSoA, size),
                        aoS: () => this.testAoSMove(posAoS, velAoS, size)
                    },
                    'X ONLY': {
                        soA: () => this.testSoAX(posSoA, velSoA, size),
                        aoS: () => this.testAoSX(posAoS, velAoS, size)
                    }
                };

                for (const [testName, testFns] of Object.entries(tests)) {
                    results[testName] = {
                        soA: this.bench(testFns.soA),
                        aoS: this.bench(testFns.aoS)
                    };
                }

                this.results[sizeKey] = results;
            }

            initData(posSoA, velSoA, posAoS, velAoS, size) {
                const px = posSoA.x, py = posSoA.y, pz = posSoA.z;
                const vx = velSoA.x, vy = velSoA.y, vz = velSoA.z;

                for (let i = 0; i < size; i++) {
                    px[i] = i; py[i] = i; pz[i] = i;
                    vx[i] = 1; vy[i] = 1; vz[i] = 1;
                    posAoS[i] = { x: i, y: i, z: i };
                    velAoS[i] = { x: 1, y: 1, z: 1 };
                }
            }

            bench(fn) {
                fn(); // warmup
                const targetDurationMs = 40;
                let runs = Math.max(1, this.iterations);
                let elapsed = 0;

                while (true) {
                    const start = performance.now();
                    for (let i = 0; i < runs; i++) {
                        fn();
                    }
                    elapsed = performance.now() - start;

                    if (elapsed >= targetDurationMs || runs >= 10_000_000) {
                        break;
                    }

                    // Increase attempts quickly to avoid 0.000000ms on very fast operations.
                    runs = Math.min(runs * 2, 10_000_000);
                }

                if (!Number.isFinite(elapsed) || elapsed <= 0 || runs <= 0) {
                    return NaN;
                }

                return elapsed / runs;
            }

            testSoASet(pos, size) {
                const px = pos.x, py = pos.y, pz = pos.z;
                for (let i = 0; i < size; i++) {
                    px[i] = i; py[i] = i; pz[i] = i;
                }
            }

            testAoSSet(pos, size) {
                for (let i = 0; i < size; i++) {
                    const p = pos[i];
                    p.x = i; p.y = i; p.z = i;
                }
            }

            testSoAGet(pos, size) {
                const px = pos.x, py = pos.y, pz = pos.z;
                let s = 0;
                for (let i = 0; i < size; i++) {
                    s ^= (px[i] | 0);
                    s ^= (py[i] | 0);
                    s ^= (pz[i] | 0);
                }
                return s;
            }

            testAoSGet(pos, size) {
                let s = 0;
                for (let i = 0; i < size; i++) {
                    const p = pos[i];
                    s ^= (p.x | 0);
                    s ^= (p.y | 0);
                    s ^= (p.z | 0);
                }
                return s;
            }

            testSoAMove(pos, vel, size) {
                const px = pos.x, py = pos.y, pz = pos.z;
                const vx = vel.x, vy = vel.y, vz = vel.z;
                for (let i = 0; i < size; i++) {
                    px[i] += vx[i];
                    py[i] += vy[i];
                    pz[i] += vz[i];
                }
            }

            testAoSMove(pos, vel, size) {
                for (let i = 0; i < size; i++) {
                    const p = pos[i], v = vel[i];
                    p.x += v.x;
                    p.y += v.y;
                    p.z += v.z;
                }
            }

            testSoAX(pos, vel, size) {
                const px = pos.x, vx = vel.x;
                for (let i = 0; i < size; i++) {
                    px[i] += vx[i];
                }
            }

            testAoSX(pos, vel, size) {
                for (let i = 0; i < size; i++) {
                    pos[i].x += vel[i].x;
                }
            }

            displayResults() {
                const container = document.getElementById('results-content');
                container.innerHTML = '';

                for (const [sizeKey, testResults] of Object.entries(this.results)) {
                    const sizeLabel = {
                        small: 'Small (1,000 items)',
                        medium: 'Medium (100,000 items)',
                        large: 'Large (10,000,000 items)'
                    }[sizeKey];

                    const html = `
                        <div class="result-header">
                            <h3>${sizeLabel}</h3>
                            <p>Average time per iteration across ${this.iterations} runs</p>
                        </div>
                        <div class="benchmark-grid">
                            ${Object.entries(testResults).map(([testName, times]) => {
                                const soATime = this.formatTime(times.soA);
                                const aoSTime = this.formatTime(times.aoS);
                                const winnerText = this.getWinnerText(times.soA, times.aoS);

                                return `
                                    <div class="benchmark-card">
                                        <h4>${testName}</h4>
                                        <div class="benchmark-row">
                                            <span class="benchmark-label">SoA</span>
                                            <div class="benchmark-values">
                                                <div class="value-item">
                                                    <div class="value-label">Time (ms)</div>
                                                    <div class="value-number soa">${soATime}</div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="benchmark-row">
                                            <span class="benchmark-label">AoS</span>
                                            <div class="benchmark-values">
                                                <div class="value-item">
                                                    <div class="value-label">Time (ms)</div>
                                                    <div class="value-number aos">${aoSTime}</div>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="benchmark-row" style="border-bottom: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0;">
                                            <span class="benchmark-label">Winner</span>
                                            <span class="winner">${winnerText}</span>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;

                    container.innerHTML += html;
                }
            }

            displaySummaryTable() {
                const container = document.getElementById('summary-table-container');
                const sizeOrder = ['small', 'medium', 'large'];
                const testOrder = ['SET', 'GET', 'MOVE', 'X ONLY'];
                const sizeLabels = {
                    small: 'Small (1,000)',
                    medium: 'Medium (100,000)',
                    large: 'Large (10,000,000)'
                };

                const rows = [];
                for (const sizeKey of sizeOrder) {
                    const sizeResults = this.results[sizeKey];
                    if (!sizeResults) continue;

                    for (const testName of testOrder) {
                        const times = sizeResults[testName];
                        if (!times) continue;

                        rows.push(`
                            <tr>
                                <td>${sizeLabels[sizeKey]}</td>
                                <td>${testName}</td>
                                <td class="value-soa">${this.formatTime(times.soA)}</td>
                                <td class="value-aos">${this.formatTime(times.aoS)}</td>
                                <td class="value-winner">${this.getWinnerText(times.soA, times.aoS)}</td>
                            </tr>
                        `);
                    }
                }

                container.innerHTML = `
                    <div class="summary-table-wrap">
                        <table class="summary-table">
                            <thead>
                                <tr>
                                    <th>Collection Size</th>
                                    <th>Test</th>
                                    <th>SoA (ms)</th>
                                    <th>AoS (ms)</th>
                                    <th>Winner</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows.join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            formatTime(value) {
                if (!Number.isFinite(value) || value < 0) {
                    return 'N/A';
                }
                return value.toFixed(6);
            }

            getWinnerText(soA, aoS) {
                const EPS = 1e-9;

                if (!Number.isFinite(soA) || !Number.isFinite(aoS) || soA < 0 || aoS < 0) {
                    return 'No valid data';
                }

                if (Math.abs(soA - aoS) <= 0.00001) {
                    return 'Equal';
                }

                if (soA <= EPS && aoS <= EPS) {
                    return 'Equal';
                }

                if (soA <= EPS) {
                    return 'SoA faster';
                }

                if (aoS <= EPS) {
                    return 'AoS faster';
                }

                const faster = soA < aoS ? 'SoA' : 'AoS';
                const fasterTime = Math.min(soA, aoS);
                const slowerTime = Math.max(soA, aoS);
                const ratio = slowerTime / fasterTime;

                if (!Number.isFinite(ratio) || ratio <= 0) {
                    return `${faster} faster`;
                }

                return `${faster} ${ratio.toFixed(2)}x faster`;
            }

            displaySystemInfo() {
                const info = {
                    'Browser': `${navigator.userAgent.split('(')[0].trim()}`,
                    'User Agent': navigator.userAgent.substring(0, 50) + '...',
                    'Cores': navigator.hardwareConcurrency || 'N/A',
                    'Device Memory': navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'N/A',
                    'Platform': navigator.platform,
                    'Screen Resolution': `${window.screen.width}x${window.screen.height}`,
                    'Iterations': this.iterations.toString(),
                    'Test Time': new Date().toLocaleString()
                };

                const infoContainer = document.getElementById('system-info');
                infoContainer.innerHTML = Object.entries(info).map(([key, value]) => `
                    <div class="info-item">
                        <div class="info-label">${key}</div>
                        <div class="info-value">${value}</div>
                    </div>
                `).join('');
            }

            showError(message) {
                const errorContainer = document.getElementById('error-container');
                errorContainer.innerHTML = `<div class="error">⚠️ ${message}</div>`;
            }

            createCharts() {
                // Destroy existing charts
                Object.values(this.charts).forEach(chart => {
                    if (chart) chart.destroy();
                });
                this.charts = {};

                const chartsContainer = document.getElementById('charts-container');
                chartsContainer.innerHTML = '';
                const themeVars = getComputedStyle(document.documentElement);
                const soaColor = themeVars.getPropertyValue('--accent').trim() || '#2f7d61';
                const aosColor = themeVars.getPropertyValue('--aos').trim() || '#8b6f47';
                const soaFill = this.hexToRgba(soaColor, 0.16);
                const aosFill = this.hexToRgba(aosColor, 0.16);

                const sizeOrder = ['small', 'medium', 'large'];
                const testOrder = ['SET', 'GET', 'MOVE', 'X ONLY'];

                for (const testName of testOrder) {
                    const chartId = `chart-${testName.toLowerCase().replace(/\s+/g, '-')}`;
                    const chartHtml = `
                        <div class="chart-container">
                            <h4>${testName}: Time vs Collection Size</h4>
                            <div class="chart-wrapper">
                                <canvas id="${chartId}"></canvas>
                            </div>
                        </div>
                    `;
                    chartsContainer.innerHTML += chartHtml;

                    const soAData = [];
                    const aoSData = [];

                    for (const sizeKey of sizeOrder) {
                        const times = this.results[sizeKey]?.[testName];
                        if (!times) continue;

                        if (Number.isFinite(times.soA) && times.soA >= 0) {
                            soAData.push({ x: this.sizes[sizeKey], y: times.soA });
                        }
                        if (Number.isFinite(times.aoS) && times.aoS >= 0) {
                            aoSData.push({ x: this.sizes[sizeKey], y: times.aoS });
                        }
                    }

                    setTimeout(() => {
                        const ctx = document.getElementById(chartId);
                        if (!ctx || (soAData.length === 0 && aoSData.length === 0)) {
                            return;
                        }

                        this.charts[chartId] = new Chart(ctx, {
                            type: 'line',
                            data: {
                                datasets: [
                                    {
                                        label: 'SoA',
                                        data: soAData,
                                        borderColor: soaColor,
                                        backgroundColor: soaFill,
                                        pointBackgroundColor: soaColor,
                                        pointRadius: 4,
                                        tension: 0.2
                                    },
                                    {
                                        label: 'AoS',
                                        data: aoSData,
                                        borderColor: aosColor,
                                        backgroundColor: aosFill,
                                        pointBackgroundColor: aosColor,
                                        pointRadius: 4,
                                        tension: 0.2
                                    }
                                ]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                parsing: false,
                                plugins: {
                                    legend: { display: true },
                                    tooltip: {
                                        callbacks: {
                                            title: function(context) {
                                                if (!context.length) return '';
                                                return `${context[0].parsed.x.toLocaleString()} items`;
                                            },
                                            label: function(context) {
                                                return `${context.dataset.label}: ${context.parsed.y.toFixed(6)} ms`;
                                            }
                                        }
                                    }
                                },
                                scales: {
                                    x: {
                                        type: 'linear',
                                        title: { display: true, text: 'Collection size (items)' },
                                        ticks: {
                                            callback: function(value) {
                                                return Number(value).toLocaleString();
                                            }
                                        },
                                        grid: { color: 'rgba(0, 0, 0, 0.05)' }
                                    },
                                    y: {
                                        beginAtZero: true,
                                        title: { display: true, text: 'Time (ms)' },
                                        grid: { color: 'rgba(0, 0, 0, 0.05)' }
                                    }
                                }
                            }
                        });
                    }, 0);
                }
            }

            hexToRgba(hex, alpha) {
                const normalized = hex.replace('#', '').trim();
                const isShort = normalized.length === 3;
                const fullHex = isShort
                    ? normalized.split('').map(ch => ch + ch).join('')
                    : normalized;

                if (!/^[0-9a-fA-F]{6}$/.test(fullHex)) {
                    return `rgba(47, 125, 97, ${alpha})`;
                }

                const r = parseInt(fullHex.slice(0, 2), 16);
                const g = parseInt(fullHex.slice(2, 4), 16);
                const b = parseInt(fullHex.slice(4, 6), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            new Benchmark();
        });
    </script>
</body>
</html>
